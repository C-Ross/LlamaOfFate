name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -v -race ./test/integration/...

  llm-eval:
    runs-on: ubuntu-latest
    # Only run on main branch pushes, not PRs (to protect secrets)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run LLM evaluation tests
        env:
          AZURE_API_ENDPOINT: ${{ secrets.AZURE_API_ENDPOINT }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
        run: go test -v -tags=llmeval ./test/llmeval/...
